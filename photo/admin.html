<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>管理者ページ｜写真投稿</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="hero hero--admin">
    <div class="hero__inner">
      <p class="eyebrow">Admin</p>
      <h1>投稿写真一覧</h1>
      <p>投稿された写真を新しい順に確認できます。</p>
    </div>
  </header>

  <main class="page">
    <section id="pinCard" class="card hidden">
      <h2>管理コード</h2>
      <p class="hint">この確認は画面上の簡易ガードです。本格運用ではFirebase Authenticationなどを追加してください。</p>
      <form id="pinForm" class="form form--inline">
        <input id="pin" type="password" inputmode="numeric" placeholder="管理コード" />
        <button type="submit" class="button">表示</button>
      </form>
      <p id="pinMessage" class="message"></p>
    </section>

    <section id="adminContent" class="card hidden">
      <div class="section-head">
        <h2>投稿一覧</h2>
        <div class="actions">
          <button id="exportCsv" type="button" class="link-button">CSV</button>
          <button id="refresh" type="button" class="link-button">更新</button>
        </div>
      </div>
      <p id="count" class="hint"></p>
      <div id="posts" class="grid grid--admin" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    <a href="index.html">投稿ページへ</a>
  </footer>

  <script type="module" src="assets/admin.js"></script>
</body>
</html>
