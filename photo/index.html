<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>写真投稿フォーム</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      <p class="eyebrow">Photo Submit</p>
      <h1>写真投稿</h1>
      <p>スマホから写真を選んで投稿できます。投稿後、この端末で投稿済み写真を確認できます。</p>
    </div>
  </header>

  <main class="page">
    <section class="card">
      <h2>写真を投稿する</h2>
      <form id="postForm" class="form">
        <label>
          お名前・番号など <span class="optional">任意</span>
          <input id="name" name="name" type="text" autocomplete="name" maxlength="60" placeholder="例：3年A組 12番" />
        </label>

        <label>
          コメント <span class="optional">任意</span>
          <textarea id="comment" name="comment" rows="3" maxlength="300" placeholder="写真の説明など"></textarea>
        </label>

        <label class="file-picker">
          <span>写真を選択</span>
          <input id="photo" name="photo" type="file" accept="image/*" capture="environment" required />
        </label>

        <div id="previewWrap" class="preview hidden" aria-live="polite">
          <img id="preview" alt="選択した写真のプレビュー" />
        </div>

        <button id="submitBtn" type="submit" class="button">投稿する</button>
        <progress id="progress" class="progress hidden" value="0" max="100"></progress>
        <p id="message" class="message" role="status"></p>
      </form>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>自分の投稿</h2>
        <button id="reloadMine" type="button" class="link-button">再読み込み</button>
      </div>
      <p class="hint">この端末で投稿した写真が表示されます。別端末で確認する場合は、投稿後に表示される確認URLを保存してください。</p>
      <div id="myPosts" class="grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    <a href="admin.html">管理者ページ</a>
  </footer>

  <script type="module" src="assets/app.js"></script>
</body>
</html>
