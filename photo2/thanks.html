<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>投稿後の案内</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="wrapper">
    <header>
      <div class="kicker">投稿後の案内</div>
      <h1>ありがとうございました</h1>
      <p class="lead">OneDriveの画面でアップロード完了と表示されていれば提出完了です。</p>
    </header>

    <section class="card">
      <h2>提出した方へ</h2>
      <p>
        この方式では、写真はOneDriveの提出用フォルダへ保存されます。
        提出者は他の人の写真を見ることはできません。
      </p>
      <div class="notice ok">
        OneDriveのアップロード完了画面を確認できていれば、管理者側で写真を確認できます。
      </div>
      <div class="notice">
        このサイトはOneDriveへの提出完了状態を自動判定できません。提出できたか不安な場合は管理者へ確認してください。
      </div>
      <div class="actions">
        <a class="btn" href="index.html">投稿ページに戻る</a>
      </div>
    </section>
  </main>
  <script src="assets/config.js"></script>
</body>
</html>
