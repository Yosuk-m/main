<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CBTテスト | 122問からランダム出題</title>
  <style>
    :root{ --bg:#0b1020;--panel:#121a33;--accent:#6aa1ff;--text:#e9eefc;--muted:#a8b3d6;--danger:#ff6a7a;--good:#5ad39d }
    html,body{height:100%}
    body{margin:0;background:linear-gradient(160deg,#0b1020,#101830 55%,#0b1020);color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji"}
    .container{max-width:980px;margin:0 auto;padding:20px}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    .brand{font-weight:800;letter-spacing:.3px}
    .chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:12px}
    .panel{background:var(--panel);border:1px solid rgba(255,255,255,.05);border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,.25);padding:18px}
    .muted{color:var(--muted)}
    .progress{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
    .progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#b782ff);width:0}
    .question-card{display:grid;gap:16px}
    fieldset{border:0;margin:0;padding:0}
    legend{font-weight:800;font-size:18px;margin-bottom:8px;white-space:pre-wrap;line-height:1.45}
    .answer-box{display:grid;gap:8px}
    textarea{width:100%;box-sizing:border-box;border-radius:14px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.04);color:var(--text);padding:12px 14px;font-size:16px;outline:none;
      min-height:120px;resize:vertical;line-height:1.5;white-space:pre-wrap}
    .nav{display:flex;gap:10px;justify-content:space-between;margin-top:6px;flex-wrap:wrap}
    button{appearance:none;border:0;border-radius:14px;padding:12px 16px;font-weight:700;cursor:pointer;
      background:var(--accent);color:#081225;box-shadow:0 6px 18px rgba(106,161,255,.35)}
    button.secondary{background:rgba(255,255,255,.08);color:var(--text);box-shadow:none;border:1px solid rgba(255,255,255,.12)}
    button.ghost{background:transparent;color:var(--text);border:1px dashed rgba(255,255,255,.2);box-shadow:none}
    button:disabled{opacity:.5;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
    .stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:14px;border-radius:14px}
    .explain{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);padding:12px;border-radius:12px;margin-top:8px;white-space:pre-wrap}
    .start{display:grid;gap:16px}
    .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    label.switch{display:inline-flex;align-items:center;gap:8px}
    input[type="checkbox"]{accent-color:var(--accent)}
    .footer{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:space-between;margin-top:12px}
    .kbd{font-variant-numeric:tabular-nums;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
      padding:1px 6px;border-radius:6px;font-size:12px}
    .size-pills{gap:10px}
    .size-pills .chip{font-size:14px;padding:10px 16px;border:2px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.06);transition:transform .06s ease,box-shadow .2s ease,background .2s ease,border-color .2s ease}
    .size-pills .chip:hover{border-color:var(--accent);background:rgba(106,161,255,.12)}
    .size-pills input[type="radio"]:checked + label.chip{border-color:var(--accent);background:linear-gradient(180deg,var(--accent),#b6ceff);
      color:#081225;box-shadow:0 8px 22px rgba(106,161,255,.35);transform:translateY(-1px)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .callout{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:14px;padding:12px}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">CBTテスト（122問からランダム出題）</div>
      <div class="chip" id="chipinfo"><span aria-hidden="true">📝</span><span>ランダム抽出</span></div>
    </header>

    <div class="panel" aria-live="polite">
      <div class="progress" aria-hidden="true"><span id="progress"></span></div>
      <div class="muted" id="meta" style="margin:10px 0 16px"></div>
      <div id="screen"></div>
    </div>

    <div class="footer">
      <div class="muted">ショートカット: <span class="kbd">Enter</span> 次へ</div>
      <div class="muted">進捗はローカル保存。Backspaceでページ戻りは無効。</div>
    </div>
  </div>

<script>
"use strict";

/********************
 * 設定
 ********************/
const CONFIG = {
  title: "CBT（122問からランダム出題）",
  sampleSize: 20,
  shuffleQuestions: true,
  allowReviewBeforeSubmit: true,
  persistKey: "cbt-forms122-state",
  masteredKey: "cbt-forms122-mastered",
  answerKeyKey: "cbt-forms122-answerkey"
};

/********************
 * 問題バンク（PDFから抽出した 122 問）
 ********************/
const BANK = [{"id": "q1", "number": 1, "stem": "⼀般的に，⼈間が判断をしたり，⾏動を起こしたりする際に必要なものを何というか。"}, {"id": "q2", "number": 2, "stem": "事実や事柄などを数字や⽂字，記号で表現したものを何というか。"}, {"id": "q3", "number": 3, "stem": "情報を分析し，問題解決に役⽴つように蓄積したものを何というか。"}, {"id": "q4", "number": 4, "stem": "知識をもとに価値を創造する⼒となるものを何というか。"}, {"id": "q5", "number": 5, "stem": "さまざまな分野にICTが浸透することで進展してきた社会を何というか。"}, {"id": "q6", "number": 6, "stem": "情報の特性の⼀つで，「もの」とは違い他者に与えてもなくなることはない性質を何というか。"}, {"id": "q7", "number": 7, "stem": "情報の特性の⼀つで，デジタル情報であれば簡単に複製でき，劣化させずに短時間で⼤量に複製できる性質を何というか。"}, {"id": "q8", "number": 8, "stem": "情報の特性の⼀つで，「もの」に⽐べて短時間に広く伝播させることができる性質を何というか。"}, {"id": "q9", "number": 9, "stem": "⼈間をはじめとする⽣物が，⽣きていくために役⽴てている最も広義な情報を何というか。"}, {"id": "q10", "number": 10, "stem": "⼈間がコミュニケーションを⾏うために⽤いられる情報を何というか。"}, {"id": "q11", "number": 11, "stem": "意味する内容が切り離され，記号だけが独⽴した情報を何というか。"}, {"id": "q12", "number": 12, "stem": "情報のやり取りを媒介するものを何というか。"}, {"id": "q13", "number": 13, "stem": "情報の流通範囲を拡⼤する役割を持つメディアを何というか。"}, {"id": "q14", "number": 14, "stem": "社会情報を論理的に媒介する役割を果たすメディアを何というか。"}, {"id": "q15", "number": 15, "stem": "マスメディアで報じられた情報をさまざまな視点で分析・評価し，情報の真偽を正しく判断する能⼒，また⽂字や画像などさまざまなメディアを活⽤して効\n果的な形態で表現する能⼒を何というか。"}, {"id": "q16", "number": 16, "stem": "情報の信憑性を確認するために，複数の情報源から提供された情報を⽐較することを何というか。"}, {"id": "q17", "number": 17, "stem": "情報の正確さや信⽤できる度合いのことを何というか。"}, {"id": "q18", "number": 18, "stem": "SNSの記事などに批判や誹謗中傷の投稿が殺到することを何というか。"}, {"id": "q19", "number": 19, "stem": "SNSなどで意⾒を投稿したとき，それに賛同する意⾒が返ってくる現象を何というか。"}, {"id": "q20", "number": 20, "stem": "インターネットなどでの検索履歴や閲覧履歴によって提⽰される情報が⾃動的に選別され，ユーザの好みや価値観に合わない情報から隔離されてしまう\n現象を何というか。"}, {"id": "q21", "number": 21, "stem": "ネットワークを使⽤して，⼿紙のように⽂章や写真データなどのやりとりをすること（する技術）を何というか。"}, {"id": "q22", "number": 22, "stem": "登録された利⽤者同⼠がインターネット上で交流できるサービスのことを何というか。"}, {"id": "q23", "number": 23, "stem": "インターネットを利⽤して，⽂字・画像・⾳声・動画などの送受信を⾏うアプリケーションを何というか。"}, {"id": "q24", "number": 24, "stem": "ネットワークを利⽤して遠隔地にいる⼈々が⾏う会議を何というか。"}, {"id": "q25", "number": 25, "stem": "ネットワークを利⽤して遠隔地にいる⼈々が⾏う授業を何というか。"}, {"id": "q26", "number": 26, "stem": "店舗内で商品を販売した時点での情報を集計・分析するなどして役⽴てているシステムのことを何というか。"}, {"id": "q27", "number": 27, "stem": "お⾦の価値を電⼦的なデータで表現したもので，専⽤端末にかざすだけで決済を⾏えるものを何というか。"}, {"id": "q28", "number": 28, "stem": "社会のさまざまなニーズにきめ細かに対応でき，あらゆる⼈が質の⾼いサービスを受け，年齢・性別・地域・⾔語といったさまざまな違いを乗り越え，活き\n活きと快適に暮らすことのできる社会のことを何というか。"}, {"id": "q29", "number": 29, "stem": "⾝の回りのあらゆるものがインターネットにつながる仕組みのことを何というか。"}, {"id": "q30", "number": 30, "stem": "⼈間の知的な活動の⼀部をコンピュータにさせることを目的とする技術や研究分野のことを何というか。"}, {"id": "q31", "number": 31, "stem": "データが膨⼤であり，その種類が多様であり，データの更新・⽣成が速いといった三つの特徴があるデータのことを何というか。"}, {"id": "q32", "number": 32, "stem": "コンピュータウイルスを⽤いてシステムをダウンさせたり，不正に他⼈のユーザIDや暗証番号などを⼊⼿してコンピュータなどに侵⼊したりするなど，コンピュータ\nや情報通信ネットワーク上で⾏われる犯罪を何というか。"}, {"id": "q33", "number": 33, "stem": "インターネットやコンピュータなどのICTを利⽤できる者と利⽤できない者との間に⽣じる格差を何というか。"}, {"id": "q34", "number": 34, "stem": "ディスプレイを⻑時間使⽤したことにより⾝体的，精神的に⽣じる症状のことを何というか。"}, {"id": "q35", "number": 35, "stem": "ICTの環境へ適応できずにストレスを感じてしまうことを何というか。"}, {"id": "q36", "number": 36, "stem": "ICTの環境に過度に依存してしまう何というか。"}, {"id": "q37", "number": 37, "stem": "ICTの環境へ適応できないことへの不安や，過度に依存してしまうことなどを総じて何というか。"}, {"id": "q38", "number": 38, "stem": "AIをより⼈間の⽣活に役⽴てるため，医療や法律などのいろいろな知識を⽤いて⾃動推論を⾏うシステムを何というか。"}, {"id": "q39", "number": 39, "stem": "コンピュータが与えられたデータから⾃動的に学習し，その結果を⽤いてデータの背景にあるルールやパターンを発⾒したり，予測や判断を⾏ったりする技術\nを何というか。"}, {"id": "q40", "number": 40, "stem": "⼈間の神経細胞（ニューロン）の仕組みを模したニューラルネットワークという技術を基礎としており，⾃動チャットなどに応⽤されているものを何というか。"}, {"id": "q41", "number": 41, "stem": "システムを動かすためのルールがシステムの外部から決められているシステムのことを何というか。"}, {"id": "q42", "number": 42, "stem": "AIが与えられた問題を解決しようとするとき，その問題の枠組みをうまく定められずにどこまでも計算を続けてしまうことを何というか。"}, {"id": "q43", "number": 43, "stem": "AIが⾃律的に動作することによって⾶躍的に進歩し，⼈知をしのいで世界を変えるとした説を何というか。"}, {"id": "q44", "number": 44, "stem": "ユーザによる⼊⼒に応じて，⽂章やプログラム，画像，⾳声，動画などを新たに⽣成することができるAIを何というか。"}, {"id": "q45", "number": 45, "stem": "おもに⼤量のテキストデータを⽤いて学習させた⾃然⾔語処理のモデルを何というか。"}, {"id": "q46", "number": 46, "stem": "⽣成AIが事実と異なる内容を出⼒することを何というか。"}, {"id": "q47", "number": 47, "stem": "現在の状態と，目標とするあるべき状態の差を何というか。"}, {"id": "q48", "number": 48, "stem": "現在の状態と，目標とするべき状態の差を解消するために解決策を⽴て，実⾏することを何というか。"}, {"id": "q49", "number": 49, "stem": "他者から意⾒をもらったり評価を受けたりすることを何というか。"}, {"id": "q50", "number": 50, "stem": "データや統計を活⽤して5段階のフェーズを循環させる⽅法を何というか。"}, {"id": "q51", "number": 51, "stem": "グループで⾃由に考えを出し合う思考法で，批判禁⽌，⾃由な意⾒歓迎，質より量，意⾒の結合改善を認めるという四つの原則が設けられているも\nのを何というか。"}, {"id": "q52", "number": 52, "stem": "収集した情報を階層化し，関係性を明らかにする⼿法を何というか。"}, {"id": "q53", "number": 53, "stem": "⼀⽅を達成するために他⽅を犠牲にしなければならない関係のこと。両⽴することが難しい⼆つのものの関係を何というか。"}, {"id": "q54", "number": 54, "stem": "⾃分⾃⾝が直接経験して得たり，考察して得たりしたオリジナルな情報を何というか。"}, {"id": "q55", "number": 55, "stem": "書籍やWebページなどにすでにまとめてあったり，保存されていたものから得られた情報を何というか。"}, {"id": "q56", "number": 56, "stem": "インターネット上のWebページの中から，指定したキーワードに関連する情報を検索するサービスを何というか。"}, {"id": "q57", "number": 57, "stem": "⾃分の著作物に，公表された他⼈の著作物を掲載する⾏為を何というか。"}, {"id": "q58", "number": 58, "stem": "街頭でのアンケート調査や聞き取り調査，実物観察などによって，情報を直接収集することを何というか。"}, {"id": "q59", "number": 59, "stem": "実際の問題解決において有効に機能するか（機能したか），導いた結論はどの程度妥当であるかなどについて，本⼈が⾃分⾃⾝で評価することを何\nというか。"}, {"id": "q60", "number": 60, "stem": "実際の問題解決において有効に機能するか（機能したか），導いた結論はどの程度妥当であるかなどについて，互いに評価し合うことを何というか。"}, {"id": "q61", "number": 61, "stem": "実際の問題解決において有効に機能するか（機能したか），導いた結論はどの程度妥当であるかなどについて，実⾏した⼈とは別の⼈が評価すること\nを何というか。"}, {"id": "q62", "number": 62, "stem": "⼩説を書いたり，コンピュータのプログラムを作成したり，商品を考案したりするなど，知的な創作活動から⽣産されたものを何というか。"}, {"id": "q63", "number": 63, "stem": "知的な創作活動から⽣産されたものを，他⼈が無断で使⽤して利益を得たりすることができないように，創作した⼈に⼀定期間与えられる権利を何とい\nうか。"}, {"id": "q64", "number": 64, "stem": "産業に関する新しい技術やデザイン，商標について開発した⼈に与えられる独占的権利を何というか。"}, {"id": "q65", "number": 65, "stem": "特許権，実⽤新案権，意匠権，商標権など，特許庁に出願して認められた時点で得ることができる⽅式を何というか。"}, {"id": "q66", "number": 66, "stem": "⾃然法則を利⽤した技術的思想の創作のうち⾼度なものや，発明を保護する権利を何というか。"}, {"id": "q67", "number": 67, "stem": "⾃然法則を利⽤した技術的思想の創作のうち物品の形状，構造などの考案を保護する権利を何というか。"}, {"id": "q68", "number": 68, "stem": "物品の形状や模様，⾊彩などの視覚を通じて美感を起こさせる斬新なデザインを保護する権利を何というか。"}, {"id": "q69", "number": 69, "stem": "⾃分が取り扱う商品やサービスと，他⼈が取り扱う商品やサービスとを区別するためのマークを保護する権利を何というか。"}, {"id": "q70", "number": 70, "stem": "著作物の公正な利⽤に留意しつつ，著作者などの権利の保護をはかることによって，⽂化の発展に寄与することを目的とした法律を何というか。"}, {"id": "q71", "number": 71, "stem": "「思想⼜は感情を創作的に表現したものであって，⽂芸，学術，美術⼜は⾳楽の範囲に属するもの」と定義されているものは何か。"}, {"id": "q72", "number": 72, "stem": "権利を得るための⼿続きや登録が必要ない⽅式を何というか。"}, {"id": "q73", "number": 73, "stem": "著作者の⼈格的な利益を保護するための権利を何というか。"}, {"id": "q74", "number": 74, "stem": "著作物の利⽤を許諾したり禁⽌したりするための権利を何というか。"}, {"id": "q75", "number": 75, "stem": "実演家や放送事業者など，著作物の公衆への伝達に重要な役割を果たしている者に与えられる権利を何というか。"}, {"id": "q76", "number": 76, "stem": "ICTを活⽤した教育での著作物利⽤の円滑化を図るため，教育機関の設置者が補償⾦を⽀払うことで，授業の過程で利⽤する必要な公衆送信につ\nいて，著作権者などに許諾を得ることなく利⽤できることを定めた制度を何というか。"}, {"id": "q77", "number": 77, "stem": "引⽤に⽤いられる⽂献のことを何というか。"}, {"id": "q78", "number": 78, "stem": "⾃分の著作物を創作する際に参考にした⽂献を何というか。"}, {"id": "q79", "number": 79, "stem": "著作権者が⾃分の著作物を⾃由に利⽤するために守るべき条件を意思表⽰するものとして利⽤さえれているものを何というか。"}, {"id": "q80", "number": 80, "stem": "知的財産権により保護されていた創作物が，権利の保護期間を経過し，社会の公共財産となって，誰でも⾃由に利⽤できるようになったものを何とい\nうか。"}, {"id": "q81", "number": 81, "stem": "Webページに掲載した画像・動画・⾳声データなどに著作権侵害（不正コピーなど）を防ぐための著作者データなどを埋め込んでおく技術を何というか。"}, {"id": "q82", "number": 82, "stem": "⽣存する個⼈に関する情報であって，それ単体や，いくつかの情報を組み合わせることで個⼈を特定できるものを何というか。"}, {"id": "q83", "number": 83, "stem": "個⼈情報の有⽤性に配慮しながら，個⼈の権利や利益を守ることを目的とした法律を何というか。"}, {"id": "q84", "number": 84, "stem": "DNA塩基配列や指紋などの⾝体的特徴，旅券番号，運転免許証番号などの個⼈に割り当てられる番号などのことを何というか。"}, {"id": "q85", "number": 85, "stem": "⾏政などで個⼈を特定する場合に必要な，⽒名，住所，⽣年⽉⽇，性別の四つの情報を何というか。"}, {"id": "q86", "number": 86, "stem": "⼈種，信条，病歴，犯罪歴など，本⼈に対する不当な差別，偏⾒が⽣じないように，その取り扱いに特に配慮を要する個⼈情報を何というか。"}, {"id": "q87", "number": 87, "stem": "関連する商品やサービスの広告などを，あらかじめ「受け取りたい」と承諾した⼈にのみ提供する⽅式を何というか。"}, {"id": "q88", "number": 88, "stem": "関連する商品やサービスの広告などを，あらかじめ「受け取りたくない」と意思表⽰した⼈には広告などを提供せず，それ以外の⼈に広告を提供する⽅式\nを何というか。"}, {"id": "q89", "number": 89, "stem": "特定の個⼈を識別することができないように個⼈情報を加⼯し，当該の個⼈情報を復元できないようにしたものを何というか。"}, {"id": "q90", "number": 90, "stem": "個⼈情報の⼀部を削除して，他の情報と照合しないと特定の個⼈を識別できないように加⼯したものを何というか。"}, {"id": "q91", "number": 91, "stem": "むやみに他⼈に知られたくない私⽣活上の個⼈的な情報を何というか。"}, {"id": "q92", "number": 92, "stem": "法律に明⽂化されていないが，憲法⼗三条を根拠にして，私⽣活をみだりに公開されないことが認められている権利は何か。"}, {"id": "q93", "number": 93, "stem": "誰にでも認められている権利で，本⼈の許可なく肖像を撮影されたり利⽤されたりしない権利を何というか。"}, {"id": "q94", "number": 94, "stem": "有名⼈に認められている権利で，名前や写真などにある商業的価値を独占できる財産的な権利を何というか。"}, {"id": "q95", "number": 95, "stem": "特定の個⼈情報を，コンピュータなどを⽤いて検索することができるように体系的に構成した個⼈情報データベースなどを構成する個⼈情報のことを何とい\nうか。"}, {"id": "q96", "number": 96, "stem": "正規のメールやWebページを装い，暗証番号やクレジットカード番号などを⼊⼒させて，それらを盗み取る詐欺のことを何というか。"}, {"id": "q97", "number": 97, "stem": "ネットワーク管理者と利⽤者などとの会話やその盗み聞き，暗証番号などを書いたメモの盗み⾒などといった，⽇常⽣活の中から⼈為的に機密情報を\n⼊⼿することを何というか。"}, {"id": "q98", "number": 98, "stem": "⼈為的ミスをなんというか。"}, {"id": "q99", "number": 99, "stem": "法律や社会規範・倫理を守ることを何というか。"}, {"id": "q100", "number": 100, "stem": "憲法第⼆⼗⼀条第⼀項で規程され，「集会，結社及び⾔論，出版その他⼀切の表現の⾃由は，これを保障する」ことを何というか。"}, {"id": "q101", "number": 101, "stem": "他⼈のユーザIDや暗証番号などを使⽤したり，プログラムの不備を攻撃して侵⼊したりするなど，アクセス権限のないコンピュータへのアクセスを⾏うことを\n禁⽌する法律を何というか。"}, {"id": "q102", "number": 102, "stem": "サイバーセキュリティに関する施策の基本理念を定め，国および地⽅公共団体の責務などを明らかにし，これを総合的かつ効果的に推進することを目的\nとする法律を何というか。"}, {"id": "q103", "number": 103, "stem": "犯罪⾏為をした場合に，どのような刑罰が科せられるかを規定する法律を何というか。"}, {"id": "q104", "number": 104, "stem": "刑法第七条の⼆で，「電⼦的⽅式，磁気的⽅式その他⼈の知覚によつては認識することができない⽅式で作られる記録であつて，電⼦計算機による\n情報処理の⽤に供されるもの」と定義されている記録を何というか。"}, {"id": "q105", "number": 105, "stem": "消費者の利益を保護し，商品などの流通を適正かつ円滑にして，国⺠経済の健全な発展に寄与することを目的とする法律をなんというか。"}, {"id": "q106", "number": 106, "stem": "店頭販売や通信販売には適⽤されないが，⼀定の期間内に無条件で消費者が解約できる制度を何というか。"}, {"id": "q107", "number": 107, "stem": "広告や宣伝のために⼤量の電⼦メールを送信することを取り締まる法律を何というか。"}, {"id": "q108", "number": 108, "stem": "インターネット上の掲⽰板やSNSで誹謗中傷などによる権利の侵害があった場合に，プロバイダの責任を明確化するとともに，プロバイダに対する発信者\n情報の開⽰を請求する権利や裁判⼿続などについて定めた法律を何というか。"}, {"id": "q109", "number": 109, "stem": "⻘少年が安全に安⼼してインターネットを利⽤できるようにして，⻘少年の権利を守ることを目的とする法律を何というか。"}, {"id": "q110", "number": 110, "stem": "有害情報を監視し，問題があれば遮断するなどの対処を⾏う技術を何というか。"}, {"id": "q111", "number": 111, "stem": "情報社会で適正な活動を⾏うための基になる考え⽅と態度を何というか。"}, {"id": "q112", "number": 112, "stem": "情報モラルよりも⼤きな概念である，情報技術の利⽤を通じて，社会に積極的に関与し，参加する能⼒を何というか。"}, {"id": "q113", "number": 113, "stem": "情報の盗聴（盗み⾒）や，改竄，破壊などの不正⾏為や不慮の事故に対して，個⼈的，組織的，技術的な安全対策を講じることを何というか。"}, {"id": "q114", "number": 114, "stem": "元のデータを他⼈にはわからなくするように処理することを何というか。"}, {"id": "q115", "number": 115, "stem": "コンピュータやサービスを利⽤するための権利を何というか。"}, {"id": "q116", "number": 116, "stem": "利⽤者を特定し利⽤資格があるかを確認するためにユーザIDと暗証番号などを⼊⼒し，認証することを何というか。"}, {"id": "q117", "number": 117, "stem": "コンピュータのシステムやソフトウェアに何らかの危害を加える悪質なプログラムのことを総称して何というか。"}, {"id": "q118", "number": 118, "stem": "マルウェアの⼀種で，ほかのファイルやシステムに寄⽣・感染する機能があるプログラムのことを特に何というか。"}, {"id": "q119", "number": 119, "stem": "ソフトウェアの⽋陥のうち，安全性に関係するものを何というか。"}, {"id": "q120", "number": 120, "stem": "本来アクセスする権限を持たない者がIDや暗証番号などを⼊⼿し，システムの内部に侵⼊することを何というか。"}, {"id": "q121", "number": 121, "stem": "不適切なWebページのリストを作成し，それを閲覧できなくする⽅式を何というか。"}, {"id": "q122", "number": 122, "stem": "有益なWebページのリストを作成し，それだけが閲覧できるようにする⽅式を何というか。"}];

/********************
 * ユーティリティ
 ********************/
const $ = (sel)=>document.querySelector(sel);
function clamp(n,min,max){return Math.max(min,Math.min(max,n));}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function sampleWithoutReplacement(arr, n){ return shuffle(arr).slice(0, Math.min(n, arr.length)); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }

function normalizeAnswer(s){
  return String(s||"").trim().normalize("NFKC").replace(/\s+/g,"").toLowerCase();
}

function getMastered(){ try{ return new Set(JSON.parse(localStorage.getItem(CONFIG.masteredKey)||"[]")); }catch(_ ){ return new Set(); } }
function setMastered(set){ try{ localStorage.setItem(CONFIG.masteredKey, JSON.stringify(Array.from(set))); }catch(_ ){} }

function loadAnswerKey(){
  try{
    const raw = localStorage.getItem(CONFIG.answerKeyKey);
    if(!raw) return {};
    const obj = JSON.parse(raw);
    if(obj && typeof obj === "object") return obj;
    return {};
  }catch(_ ){ return {}; }
}
function saveAnswerKey(obj){
  try{ localStorage.setItem(CONFIG.answerKeyKey, JSON.stringify(obj||{})); }catch(_ ){}
}

function load(){ try{ const raw=localStorage.getItem(CONFIG.persistKey); return raw?JSON.parse(raw):null; }catch(_ ){ return null; } }
function save(){ try{ localStorage.setItem(CONFIG.persistKey, JSON.stringify(state)); }catch(_ ){} }

/********************
 * 可変出題数
 ********************/
function getSampleSize(){ return (state && state.settings && state.settings.sampleSize) ? state.settings.sampleSize : CONFIG.sampleSize; }
function titleText(){ return `${CONFIG.title}（${getSampleSize()}問）`; }
function updateMetaLabels(){
  const n = getSampleSize();
  const chip = document.getElementById("chipinfo");
  if(chip){
    const spans = chip.querySelectorAll("span");
    if(spans.length>=2) spans[1].textContent = `${n}問をランダム抽出`;
  }
  document.title = `CBTテスト | ${n}問`;
}

    excludeMastered: false
  }
};

  ANSWER_KEY = loadAnswerKey();
  setupKeys();
  renderStart();
})();

/********************
 * スタート画面
 ********************/
function renderStart(){
  state.submitted = false;
  $("#progress").style.width = "0%";
  updateMetaLabels();
  $("#meta").textContent = titleText();

  const s = document.createElement("div"); s.className = "start";

  const info = document.createElement("div"); info.className="callout";
  info.innerHTML = `
    <div style="font-weight:900;margin-bottom:6px">このCBTについて</div>
    <div class="muted">・PDFから抽出した <strong>${BANK.length}問</strong> からランダムに出題します。</div>
    <div class="muted">・本版は<strong>記述式（テキスト入力）</strong>です。</div>
    <div class="muted">・採点したい場合は、下の欄に「正解キー(JSON)」を貼り付けて読み込んでください（例: <span class="kbd">{"q1":"答え"}</span>）。</div>
  `;

  const sizes = [10,20,30,40,50];
  const sizeRow = document.createElement("div"); sizeRow.className='row size-pills';
  const sizeLabel = document.createElement("div"); sizeLabel.className='muted'; sizeLabel.textContent='1回の出題数:'; sizeRow.appendChild(sizeLabel);
  const currentSize = getSampleSize();
  let startBtn = null;

  sizes.forEach(n=>{
    const id = `size-${n}`;
    const input = document.createElement("input");
    input.type="radio"; input.name="samplesize"; input.id=id; input.value=String(n); input.className="sr-only";
    if(currentSize===n) input.checked=true;
    const label = document.createElement("label"); label.className="chip"; label.setAttribute("for", id); label.textContent=`${n}問`;

    input.addEventListener("change",()=>{
      state.settings.sampleSize = n;
      save();
      updateMetaLabels();
      $("#meta").textContent = titleText();
      if(startBtn) startBtn.textContent = `テスト開始（${getSampleSize()}問を抽出）`;
    });

    sizeRow.appendChild(input);
    sizeRow.appendChild(label);
  });

  const hasKey = Object.keys(ANSWER_KEY||{}).length>0;
  const mastered = getMastered();

  const chkRow = document.createElement("div"); chkRow.className="row";
  const chk = document.createElement("input"); chk.type="checkbox"; chk.id="excl"; chk.checked=!!state.settings.excludeMastered;
  chk.addEventListener("change",()=>{ state.settings.excludeMastered = chk.checked; save(); renderStart(); });
  const lbl = document.createElement("label"); lbl.className="switch"; lbl.htmlFor="excl";
  lbl.innerHTML = "<strong>次以降の出題から「正解済み」を除外（正解キーがある場合のみ有効）</strong>";
  chkRow.appendChild(chk); chkRow.appendChild(lbl);

  const note = document.createElement("div"); note.className="muted";
  note.textContent = hasKey
    ? `正解キー: 読み込み済み（${Object.keys(ANSWER_KEY).length}件） / 保存済み正解: ${mastered.size}問`
    : "正解キー: 未設定（採点なしで実行されます）";

  const keyBox = document.createElement("div"); keyBox.className="callout";
  keyBox.innerHTML = `
    <div style="font-weight:900;margin-bottom:6px">正解キー（JSON）</div>
    <div class="muted" style="margin-bottom:8px">例：{"q1":"情報","q2":"通信メディア"}</div>
  `;
  const ta = document.createElement("textarea");
  ta.placeholder = "ここにJSONを貼り付け（任意）";
  ta.value = hasKey ? JSON.stringify(ANSWER_KEY, null, 2) : "";
  keyBox.appendChild(ta);

  const keyBtns = document.createElement("div"); keyBtns.className="row";
  const loadBtn = document.createElement("button"); loadBtn.className="secondary"; loadBtn.textContent="正解キーを読み込む";
  loadBtn.addEventListener("click",()=>{
    try{
      const obj = JSON.parse(ta.value || "{}");
      if(!obj || typeof obj!=="object") throw new Error("JSONがオブジェクトではありません");
      ANSWER_KEY = obj;
      saveAnswerKey(obj);
      renderStart();
    }catch(err){
      alert("正解キーの読み込みに失敗しました。JSON形式を確認してください。\n" + err.message);
    }
  });
  const clearKeyBtn = document.createElement("button"); clearKeyBtn.className="ghost"; clearKeyBtn.textContent="正解キーをクリア";
  clearKeyBtn.addEventListener("click",()=>{ ANSWER_KEY={}; saveAnswerKey({}); renderStart(); });

  const resetMasteredBtn = document.createElement("button"); resetMasteredBtn.className="ghost"; resetMasteredBtn.textContent="正解済みリセット";
  resetMasteredBtn.addEventListener("click",()=>{ setMastered(new Set()); renderStart(); });

  keyBtns.appendChild(loadBtn);
  keyBtns.appendChild(clearKeyBtn);
  keyBtns.appendChild(resetMasteredBtn);
  keyBox.appendChild(keyBtns);

  const btns = document.createElement("div"); btns.className="row";
  startBtn = document.createElement("button"); startBtn.textContent = `テスト開始（${getSampleSize()}問を抽出）`;
  startBtn.addEventListener("click", startNewExam);
  btns.appendChild(startBtn);

  s.appendChild(info);
  s.appendChild(sizeRow);
  s.appendChild(chkRow);
  s.appendChild(note);
  s.appendChild(keyBox);
  s.appendChild(btns);

  const screen = $("#screen"); screen.innerHTML=""; screen.appendChild(s);
}

/********************
 * 出題開始
 ********************/
function startNewExam(){
  const N = getSampleSize();
  const hasKey = Object.keys(ANSWER_KEY||{}).length>0;
  const mastered = getMastered();

  let pool = BANK.slice();
  if(state.settings.excludeMastered && hasKey){
    const filtered = pool.filter(q=>!mastered.has(q.id));
    if(filtered.length>0) pool = filtered;
  }

  const selected = sampleWithoutReplacement(pool, N);
  const ids = selected.map(q=>q.id);
  state.order = CONFIG.shuffleQuestions ? shuffle(ids) : ids;
  state.answers = {};
  state.current = 0;
  state.submitted = false;
  state.score = 0;
  state.gradedCount = 0;

  save();
  render();
}

/********************
 * 描画
 ********************/
function getQuestionByOrder(i){ return BANK.find(q=>q.id===state.order[i]); }

function render(){
  if(!state.order.length && !state.submitted){ renderStart(); return; }

  const total = state.order.length;
  state.current = clamp(state.current, 0, Math.max(0,total-1));

  if(state.submitted){
    $("#meta").textContent = "結果";
    $("#progress").style.width = "100%";
    const screen=$("#screen"); screen.innerHTML=""; screen.appendChild(renderResult());
    return;
  }

  const q = getQuestionByOrder(state.current);
  $("#meta").textContent = `${titleText()} — 問題 ${state.current+1} / ${total}`;
  updateMetaLabels();
  const pct = (total<=1?0:(state.current/(total-1))*100);
  $("#progress").style.width = `${pct}%`;

  const screen=$("#screen"); screen.innerHTML="";
  const card=document.createElement("div"); card.className="question-card";

  const fs=document.createElement("fieldset");
  const lg=document.createElement("legend");
  lg.textContent = `Q${q.number}\n${q.stem}`;
  fs.appendChild(lg);

  const box=document.createElement("div"); box.className="answer-box";
  const input=document.createElement("textarea");
  input.placeholder = "解答を入力（記述式）";
  input.value = state.answers[q.id] || "";
  input.addEventListener("input",()=>{
    state.answers[q.id] = input.value;
    save();
  });
  box.appendChild(input);
  fs.appendChild(box);
  card.appendChild(fs);

  const nav=document.createElement("div"); nav.className="nav";

  const home=document.createElement("button"); home.className="ghost"; home.textContent="🏠 最初のページ";
  home.addEventListener("click", ()=>renderStart());

  const back=document.createElement("button"); back.className="secondary"; back.textContent="← 戻る";
  back.disabled = (state.current===0) || !CONFIG.allowReviewBeforeSubmit;
  back.addEventListener("click", ()=>{ state.current--; save(); render(); });

  const next=document.createElement("button");
  next.textContent = (state.current===total-1) ? "解答を送信" : "次へ →";
  next.addEventListener("click", ()=>{
    if(state.current===total-1) submitAnswers();
    else { state.current++; save(); render(); }
  });

  nav.appendChild(home);
  nav.appendChild(back);
  nav.appendChild(next);
  card.appendChild(nav);

  screen.appendChild(card);
}

/********************
 * 採点
 ********************/
function submitAnswers(){
  const key = ANSWER_KEY || {};
  const hasKey = Object.keys(key).length>0;
  const mastered = getMastered();

  let score=0;
  let graded=0;

  if(hasKey){
    state.order.forEach(id=>{
      if(key[id]===undefined) return;
      graded++;
      const your = normalizeAnswer(state.answers[id]);
      const correct = normalizeAnswer(key[id]);
      const ok = (your!=="" && your===correct);
      if(ok){ score++; mastered.add(id); }
    });
    setMastered(mastered);
  }

  state.score = score;
  state.gradedCount = graded;
  state.submitted = true;
  save();
  render();
}

function renderResult(){
  const wrap=document.createElement("div");
  const total=state.order.length;

  const hasKey = Object.keys(ANSWER_KEY||{}).length>0;
  const graded = state.gradedCount;

  const h=document.createElement("h2"); h.textContent="結果"; wrap.appendChild(h);

  const stats=document.createElement("div"); stats.className="grid";
  if(hasKey && graded>0){
    const percent = Math.round((state.score/graded)*100);
    stats.appendChild(stat("得点（採点対象のみ）", `${state.score} / ${graded}（${percent}%）`));
    stats.appendChild(stat("採点対象外", `${total-graded} 問`));
  } else {
    stats.appendChild(stat("完了", `${total} 問`));
    stats.appendChild(stat("採点", "正解キーが未設定のためスコアは表示しません"));
  }
  wrap.appendChild(stats);

  if(hasKey && graded>0){
    const okPanel=document.createElement("div"); okPanel.className="panel";
    okPanel.innerHTML = `<div style="font-weight:900;margin-bottom:8px">正解した問題（正解・あなたの解答のみ表示）</div>`;
    let anyOk=false;

    const ngPanel=document.createElement("div"); ngPanel.className="panel";
    ngPanel.innerHTML = `<div style="font-weight:900;margin-bottom:8px">不正解の問題（問題文のみ）</div>`;
    let anyNg=false;

    state.order.forEach(id=>{
      if(ANSWER_KEY[id]===undefined) return;
      const q = BANK.find(x=>x.id===id);
      const yourRaw = state.answers[id]||"";
      const ok = (normalizeAnswer(yourRaw)!=="" && normalizeAnswer(yourRaw)===normalizeAnswer(ANSWER_KEY[id]));
      if(ok){
        anyOk=true;
        const b=document.createElement("div"); b.className="explain";
        b.innerHTML = `<div><strong>Q${q.number}</strong> ${escapeHtml(q.stem)}</div>
          <div class="muted">あなたの解答: ${escapeHtml(yourRaw||"（未回答）")}</div>
          <div>正解: ${escapeHtml(String(ANSWER_KEY[id]))}</div>`;
        okPanel.appendChild(b);
      }else{
        anyNg=true;
        const b=document.createElement("div"); b.className="explain";
        b.innerHTML = `<div><strong>Q${q.number}</strong> ${escapeHtml(q.stem)}</div>`;
        ngPanel.appendChild(b);
      }
    });

    if(!anyOk) okPanel.appendChild(Object.assign(document.createElement("div"),{className:"muted",textContent:"正解はありません。"}));
    if(!anyNg) ngPanel.appendChild(Object.assign(document.createElement("div"),{className:"muted",textContent:"不正解はありません。"}));

    wrap.appendChild(okPanel);
    wrap.appendChild(ngPanel);

    const actions=document.createElement("div"); actions.className="nav";
    const retryWrong=document.createElement("button"); retryWrong.textContent="間違えた問題だけリトライ";
    retryWrong.addEventListener("click", retryIncorrectOnly);

    const retryAll=document.createElement("button"); retryAll.textContent=`${getSampleSize()}問で新しく受ける（再抽出）`;
    retryAll.addEventListener("click", startNewExam);

    const exportBtn=document.createElement("button"); exportBtn.className="secondary"; exportBtn.textContent="結果をJSON保存";
    exportBtn.addEventListener("click", exportResult);

    actions.appendChild(retryWrong);
    actions.appendChild(retryAll);
    actions.appendChild(exportBtn);
    wrap.appendChild(actions);
  } else {
    const listPanel=document.createElement("div"); listPanel.className="panel";
    listPanel.innerHTML = `<div style="font-weight:900;margin-bottom:8px">入力内容（採点なし）</div>
      <div class="muted" style="margin-bottom:8px">※採点するには、スタート画面で正解キー(JSON)を読み込んでください。</div>`;
    state.order.forEach(id=>{
      const q = BANK.find(x=>x.id===id);
      const your = state.answers[id]||"";
      const b=document.createElement("div"); b.className="explain";
      b.innerHTML = `<div><strong>Q${q.number}</strong> ${escapeHtml(q.stem)}</div>
        <div class="muted">あなたの解答: ${escapeHtml(your||"（未回答）")}</div>`;
      listPanel.appendChild(b);
    });
    wrap.appendChild(listPanel);

    const actions=document.createElement("div"); actions.className="nav";
    const retryAll=document.createElement("button"); retryAll.textContent=`${getSampleSize()}問で新しく受ける（再抽出）`;
    retryAll.addEventListener("click", startNewExam);

    const exportBtn=document.createElement("button"); exportBtn.className="secondary"; exportBtn.textContent="結果をJSON保存";
    exportBtn.addEventListener("click", exportResult);

    actions.appendChild(retryAll);
    actions.appendChild(exportBtn);
    wrap.appendChild(actions);
  }

  return wrap;
}

function stat(label,value){
  const d=document.createElement("div"); d.className="stat";
  d.innerHTML = `<div class="muted">${escapeHtml(label)}</div><div style="font-size:20px;font-weight:900">${escapeHtml(value)}</div>`;
  return d;
}

function retryIncorrectOnly(){
  const key = ANSWER_KEY || {};
  if(Object.keys(key).length===0){ startNewExam(); return; }

  const wrongIds = state.order.filter(id=>{
    if(key[id]===undefined) return false;
    const your = normalizeAnswer(state.answers[id]);
    const correct = normalizeAnswer(key[id]);
    return !(your!=="" && your===correct);
  });

  if(wrongIds.length===0){ startNewExam(); return; }

  state.order = shuffle(wrongIds);
  state.answers = {};
  state.current = 0;
  state.submitted = false;
  state.score = 0;
  state.gradedCount = wrongIds.length;
  save();
  render();
}

function exportResult(){
  const payload = {
    title: CONFIG.title,
    sampled: state.order.length,
    graded: state.gradedCount,
    score: state.score,
    answers: state.answers,
    answerKeyLoaded: Object.keys(ANSWER_KEY||{}).length
  };
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "result.json"; a.click();
  URL.revokeObjectURL(url);
}

/********************
 * キーボード操作
 ********************/
function setupKeys(){
  window.addEventListener("keydown",(e)=>{
    const tag = document.activeElement && document.activeElement.tagName;
    if(e.key==="Backspace" && tag!=="INPUT" && tag!=="TEXTAREA" && tag!=="SELECT"){ e.preventDefault(); }

    if(state.submitted) return;
    if(!state.order.length) return;

    if(e.key==="Enter" && !e.shiftKey){
      e.preventDefault();
      const total = state.order.length;
      if(state.current===total-1) submitAnswers();
      else { state.current++; save(); render(); }
    }
  });
}
</script>
