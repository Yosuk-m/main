<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>最終結果発表</title>

  <style>
    body {
      font-family: sans-serif;
      background: #000;
      color: #fff;
      padding: 30px;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      background: #000;
      color: #fff;
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      overflow: hidden;
    }

    h1 {
      color: #fff;
      font-size: 36px;
      margin-bottom: 10px;
    }

    .note {
      font-size: 14px;
      color: #ddd;
      margin-top: -5px;
      margin-bottom: 10px;
    }

    .stage {
      position: relative;
      width: 620px;
      max-width: 100%;
      margin: 0 auto 10px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .character-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      overflow: visible;
    }

    .low-character {
      position: absolute;
      opacity: 0;
      transform: translateY(330px) scale(0.9);
      transition:
        transform 1.25s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.35s ease;
      will-change: transform, opacity;
    }

    .low-character img {
      width: 100%;
      display: block;
      transform-origin: center center;
    }

    .char-left-1 {
      left: 2%;
      top: 24%;
      width: 118px;
      transition-delay: 0s;
    }

    .char-left-2 {
      left: 13%;
      top: 48%;
      width: 98px;
      transition-delay: 0.12s;
    }

    .char-right-1 {
      right: 0%;
      top: 30%;
      width: 124px;
      transition-delay: 0.24s;
    }

    .low-score-active .low-character {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .low-score-active .char-left-1 img {
      animation: swayLeftOne 2.6s ease-in-out infinite alternate;
    }

    .low-score-active .char-left-2 img {
      animation: swayLeftTwo 2.2s ease-in-out infinite alternate;
    }

    .low-score-active .char-right-1 img {
      animation: swayRightOne 2.8s ease-in-out infinite alternate;
    }

    @keyframes swayLeftOne {
      from { transform: translate(-12px, 4px) rotate(-9deg) scale(0.97); }
      to   { transform: translate(14px, -20px) rotate(9deg) scale(1.04); }
    }

    @keyframes swayLeftTwo {
      from { transform: translate(10px, 8px) rotate(10deg) scale(1.02); }
      to   { transform: translate(-13px, -18px) rotate(-10deg) scale(0.96); }
    }

    @keyframes swayRightOne {
      from { transform: translate(14px, 5px) rotate(9deg) scale(0.98); }
      to   { transform: translate(-16px, -22px) rotate(-9deg) scale(1.05); }
    }


    .reward-character {
      position: absolute;
      opacity: 0;
      transform: translateY(340px) scale(0.88);
      transition:
        transform 1.2s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.35s ease;
      will-change: transform, opacity;
    }

    .reward-character img {
      width: 100%;
      display: block;
      border-radius: 8px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.55);
      transform-origin: center center;
    }

    .reward-left {
      left: 0%;
      top: 14%;
      width: 154px;
      transition-delay: 0s;
    }

    .reward-right {
      right: 0%;
      top: 13%;
      width: 240px;
      transition-delay: 0.16s;
    }

    .high-score-active .reward-character {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .high-score-active .reward-left img {
      animation: rewardSwayLeft 2.5s ease-in-out infinite alternate;
    }

    .high-score-active .reward-right img {
      animation: rewardSwayRight 2.3s ease-in-out infinite alternate;
    }

    @keyframes rewardSwayLeft {
      from { transform: translate(-8px, 8px) rotate(-6deg) scale(0.98); }
      to   { transform: translate(10px, -14px) rotate(6deg) scale(1.04); }
    }

    @keyframes rewardSwayRight {
      from { transform: translate(9px, 7px) rotate(6deg) scale(1.02); }
      to   { transform: translate(-10px, -13px) rotate(-6deg) scale(0.98); }
    }

    .score-guide {
      stroke: rgba(255, 255, 255, 0.35);
      stroke-width: 2;
      stroke-dasharray: 6 6;
    }

    .score-line {
      stroke: #fff;
      stroke-width: 5;
      stroke-linecap: round;
    }

    .score-dot {
      fill: #fff;
    }

    .score-text {
      fill: #fff;
      font-size: 18px;
      font-weight: bold;
    }



    .ranking {
      font-size: 22px;
      font-weight: bold;
      margin: 6px 0 14px;
      color: #fff;
    }

    .ranking-count {
      font-size: 15px;
      font-weight: normal;
      color: #ddd;
      margin-left: 6px;
    }

    .ranking-note {
      font-size: 12px;
      color: #aaa;
      margin-top: -8px;
      margin-bottom: 14px;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
      color: #fff;
    }

    button {
      padding: 10px 28px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #ff3b1f;
      color: white;
      cursor: pointer;
      margin-bottom: 16px;
    }

    button:hover {
      background: #d92f18;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      max-width: 300px;
      margin: 0 auto;
    }

    input {
      width: 80px;
      padding: 8px;
      font-size: 16px;
      border: 1px solid #fff;
      border-radius: 6px;
      text-align: right;
      background: #111;
      color: #fff;
    }

    input:focus {
      outline: 2px solid #ff3b1f;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 20px 14px;
      }

      h1 {
        font-size: 28px;
      }

      .char-left-1 {
        width: 82px;
        left: -1%;
        top: 28%;
      }

      .char-left-2 {
        width: 72px;
        left: 12%;
        top: 51%;
      }

      .char-right-1 {
        width: 88px;
        right: -2%;
        top: 33%;
      }


      .reward-left {
        width: 106px;
        left: -1%;
        top: 16%;
      }

      .reward-right {
        width: 134px;
        right: -1%;
        top: 16%;
      }
    }
  </style>
</head>

<body>
  <div class="container" id="resultContainer">
    <h1>最終結果発表</h1>

    <p class="note">各項目の上限はありません。3項目の点数合計を表示します。</p>

    <div class="stage">
      <svg viewBox="0 0 620 420">
        <defs>
          <clipPath id="pyramidClip">
            <polygon points="260,20 60,380 460,380" />
          </clipPath>

          <linearGradient id="goldGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#d4af37" />
            <stop offset="50%" stop-color="#ffd700" />
            <stop offset="100%" stop-color="#fff3a0" />
          </linearGradient>

          <linearGradient id="silverGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#8f8f8f" />
            <stop offset="50%" stop-color="#cfcfcf" />
            <stop offset="100%" stop-color="#ffffff" />
          </linearGradient>

          <linearGradient id="bronzeGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#8c4a1f" />
            <stop offset="50%" stop-color="#cd7f32" />
            <stop offset="100%" stop-color="#f0b06a" />
          </linearGradient>

          <linearGradient id="redGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#8b0000" />
            <stop offset="100%" stop-color="#ff3030" />
          </linearGradient>

          <linearGradient id="greenGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#006400" />
            <stop offset="100%" stop-color="#00cc66" />
          </linearGradient>

          <linearGradient id="blueGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#001a66" />
            <stop offset="100%" stop-color="#008cff" />
          </linearGradient>
        </defs>

        <!-- 最初から色付きのピラミッド -->
        <g clip-path="url(#pyramidClip)">
          <rect x="60" y="20" width="400" height="60" fill="url(#goldGradient)" />
          <rect x="60" y="80" width="400" height="60" fill="url(#silverGradient)" />
          <rect x="60" y="140" width="400" height="60" fill="url(#bronzeGradient)" />
          <rect x="60" y="200" width="400" height="60" fill="url(#redGradient)" />
          <rect x="60" y="260" width="400" height="60" fill="url(#greenGradient)" />
          <rect x="60" y="320" width="400" height="60" fill="url(#blueGradient)" />
        </g>

        <!-- 得点ライン用の縦ガイド -->
        <line
          class="score-guide"
          x1="505"
          y1="20"
          x2="505"
          y2="380"
        />

        <!-- 得点に応じて上昇するライン -->
        <g id="scoreMarker" transform="translate(0, 380)" opacity="0">
          <line
            class="score-line"
            x1="60"
            y1="0"
            x2="590"
            y2="0"
          />

          <circle
            class="score-dot"
            cx="505"
            cy="0"
            r="7"
          />

          <text
            id="scoreMarkerText"
            class="score-text"
            x="505"
            y="-12"
            text-anchor="middle"
          >
            0点
          </text>
        </g>
      </svg>

    <div class="ranking" id="rankingBox" aria-live="polite">
      ランキング：<span id="rankingValue">未確定</span>
      <span class="ranking-count" id="rankingCount"></span>
    </div>
    <div class="ranking-note">点数データはこのブラウザ内に保存され、上位何％にあたるかを表示します。ピラミッドの高さは保存データ内の順位に対応し、1位が最上位になります。</div>

    <div class="total">
      合計：<span id="totalValue">0</span>点
    </div>

    <button id="confirmButton">確定</button>

    <div class="inputs">
      <input type="number" class="value-input" min="0" value="0">
      <input type="number" class="value-input" min="0" value="0">
      <input type="number" class="value-input" min="0" value="0">
    </div>
  </div>

  <script>
    const resultContainer = document.getElementById("resultContainer");
    const inputs = document.querySelectorAll(".value-input");
    const confirmButton = document.getElementById("confirmButton");
    const totalValue = document.getElementById("totalValue");
    const rankingValue = document.getElementById("rankingValue");
    const rankingCount = document.getElementById("rankingCount");
    const scoreMarker = document.getElementById("scoreMarker");
    const scoreMarkerText = document.getElementById("scoreMarkerText");

    const LOW_SCORE_CHARACTER_LIMIT = 1800;
    const HIGH_SCORE_REWARD_LIMIT = 4500;
    const SCORE_HISTORY_KEY = "final_result_pyramid_score_history_v1";

    const PYRAMID_TOP_Y = 20;
    const PYRAMID_BOTTOM_Y = 380;
    const PYRAMID_HEIGHT = PYRAMID_BOTTOM_Y - PYRAMID_TOP_Y;

    let scoreAnimationId = null;

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateScoreLine(targetY, total, onComplete) {
      if (scoreAnimationId) {
        cancelAnimationFrame(scoreAnimationId);
      }

      const duration = 1300;
      const startTime = performance.now();
      const startY = PYRAMID_BOTTOM_Y;

      scoreMarker.setAttribute("opacity", "1");
      scoreMarkerText.textContent = total + "点";

      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easedProgress = easeOutCubic(progress);

        const currentY = startY + (targetY - startY) * easedProgress;

        scoreMarker.setAttribute(
          "transform",
          `translate(0, ${currentY})`
        );

        if (progress < 1) {
          scoreAnimationId = requestAnimationFrame(animate);
        } else if (typeof onComplete === "function") {
          onComplete();
        }
      }

      scoreAnimationId = requestAnimationFrame(animate);
    }

    function calculateTotal() {
      let total = 0;

      inputs.forEach(input => {
        let value = Number(input.value) || 0;

        // 各項目の上限は設けず、0未満のみ0として扱います。
        value = Math.max(0, value);

        input.value = value;
        total += value;
      });

      return total;
    }

    function getScoreHistory() {
      try {
        const rawHistory = JSON.parse(
          localStorage.getItem(SCORE_HISTORY_KEY) || "[]"
        );

        if (!Array.isArray(rawHistory)) {
          return [];
        }

        return rawHistory
          .filter(record => {
            return record &&
              Number.isFinite(Number(record.score)) &&
              Number(record.score) >= 0;
          })
          .map(record => ({
            score: Number(record.score),
            createdAt: record.createdAt || ""
          }));
      } catch (error) {
        return [];
      }
    }

    function saveScore(total) {
      const history = getScoreHistory();

      history.push({
        score: total,
        createdAt: new Date().toISOString()
      });

      localStorage.setItem(SCORE_HISTORY_KEY, JSON.stringify(history));

      return history;
    }

    function getRank(total, history) {
      // 自分より高い点数の件数 + 1 を順位にします。
      // 同点の場合は同じ順位になります。
      return history.filter(record => record.score > total).length + 1;
    }

    function getTopPercentage(rank, history) {
      return Math.max(1, Math.ceil((rank / history.length) * 100));
    }

    function getRankBasedTargetY(rank, history) {
      // ピラミッドの高さをランキングに対応させます。
      // 1位は必ず最上位、最下位は下部に近づくように配置します。
      if (history.length <= 1) {
        return PYRAMID_TOP_Y;
      }

      const rankRatio = (rank - 1) / (history.length - 1);
      const limitedRatio = Math.max(0, Math.min(rankRatio, 1));

      return PYRAMID_TOP_Y + PYRAMID_HEIGHT * limitedRatio;
    }

    function updateRankingDisplay(rank, history) {
      const topPercentage = getTopPercentage(rank, history);

      rankingValue.textContent = "上位" + topPercentage + "%";
      rankingCount.textContent = "（" + history.length + "件中 / " + rank + "位相当）";
    }

    function showResult() {
      const total = calculateTotal();

      // 先に保存し、保存済みデータ内の順位に応じてライン位置を決めます。
      const history = saveScore(total);
      const rank = getRank(total, history);
      const targetY = getRankBasedTargetY(rank, history);

      totalValue.textContent = total;
      rankingValue.textContent = "集計中...";
      rankingCount.textContent = "";

      resultContainer.classList.remove("low-score-active");
      resultContainer.classList.remove("high-score-active");

      animateScoreLine(targetY, total, () => {
        updateRankingDisplay(rank, history);

        if (total <= LOW_SCORE_CHARACTER_LIMIT) {
          resultContainer.classList.add("low-score-active");
        } else if (total >= HIGH_SCORE_REWARD_LIMIT) {
          resultContainer.classList.add("high-score-active");
        }
      });
    }

    confirmButton.addEventListener("click", showResult);
  </script>
</body>
</html>
