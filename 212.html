<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>最終結果発表</title>

  <style>
    body {
      font-family: sans-serif;
      background: #000;
      color: #fff;
      padding: 30px;
      text-align: center;
    }

    .container {
      position: relative;
      max-width: 720px;
      margin: 0 auto;
      background: #000;
      color: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 30px rgba(255, 255, 255, 0.2);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    #fireworksCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #fff;
      font-size: 36px;
      margin-bottom: 10px;
    }

    .note {
      font-size: 14px;
      color: #ddd;
      margin-top: -5px;
      margin-bottom: 10px;
    }

    svg {
      width: 500px;
      height: 390px;
      max-width: 100%;
      margin-bottom: 10px;
    }

    .total {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
      color: #fff;
    }

    button {
      padding: 10px 28px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #ff3b1f;
      color: white;
      cursor: pointer;
      margin-bottom: 16px;
    }

    button:hover {
      background: #d92f18;
    }

    .inputs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      max-width: 320px;
      margin: 0 auto;
    }

    input {
      width: 60px;
      padding: 8px;
      font-size: 16px;
      border: 1px solid #fff;
      border-radius: 6px;
      text-align: right;
      background: #111;
      color: #fff;
    }

    input:focus {
      outline: 2px solid #ff3b1f;
    }
  </style>
</head>

<body>
  <div class="container">
    <canvas id="fireworksCanvas"></canvas>

    <div class="content">
      <h1>最終結果発表</h1>

      <p class="note">各項目は25点満点、合計100点満点です。</p>

      <svg viewBox="0 0 500 390">
        <defs>
          <clipPath id="pyramidClip">
            <polygon points="250,20 50,380 450,380" />
          </clipPath>

          <clipPath id="fillClip">
            <rect id="fillClipRect" x="50" y="380" width="400" height="0" />
          </clipPath>

          <!-- 下から 青 → 緑 → 黄 → 赤 → 濃い赤 のグラデーション -->
          <linearGradient id="scoreGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#0066ff" />
            <stop offset="25%" stop-color="#00b050" />
            <stop offset="50%" stop-color="#fff200" />
            <stop offset="75%" stop-color="#ff3b1f" />
            <stop offset="100%" stop-color="#7a0000" />
          </linearGradient>
        </defs>

        <g clip-path="url(#pyramidClip)">
          <g clip-path="url(#fillClip)">
            <rect
              x="50"
              y="20"
              width="400"
              height="360"
              fill="url(#scoreGradient)"
            />
          </g>
        </g>
      </svg>

      <div class="total">
        合計：<span id="totalValue">0</span> / 100点
      </div>

      <button id="confirmButton">確定</button>

      <div class="inputs">
        <input type="number" class="value-input" min="0" max="25" value="0">
        <input type="number" class="value-input" min="0" max="25" value="0">
        <input type="number" class="value-input" min="0" max="25" value="0">
        <input type="number" class="value-input" min="0" max="25" value="0">
      </div>
    </div>
  </div>

  <script>
    const inputs = document.querySelectorAll(".value-input");
    const confirmButton = document.getElementById("confirmButton");
    const totalValue = document.getElementById("totalValue");
    const fillClipRect = document.getElementById("fillClipRect");

    const container = document.querySelector(".container");
    const fireworksCanvas = document.getElementById("fireworksCanvas");
    const ctx = fireworksCanvas.getContext("2d");

    const MAX_TOTAL = 100;
    const MAX_ITEM_SCORE = 25;

    const PYRAMID_BOTTOM_Y = 380;
    const PYRAMID_HEIGHT = 360;

    let animationId = null;

    let fireworksAnimationId = null;
    let fireworksTimer = null;
    let fireworksRunning = false;
    let fireworksLevel = 0;
    let particles = [];

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function animateWater(targetHeight) {
      if (animationId) {
        cancelAnimationFrame(animationId);
      }

      const duration = 1200;
      const startTime = performance.now();

      fillClipRect.setAttribute("y", PYRAMID_BOTTOM_Y);
      fillClipRect.setAttribute("height", 0);

      function animate(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easedProgress = easeOutCubic(progress);

        const currentHeight = targetHeight * easedProgress;
        const currentY = PYRAMID_BOTTOM_Y - currentHeight;

        fillClipRect.setAttribute("y", currentY);
        fillClipRect.setAttribute("height", currentHeight);

        if (progress < 1) {
          animationId = requestAnimationFrame(animate);
        }
      }

      animationId = requestAnimationFrame(animate);
    }

    function resizeFireworksCanvas() {
      const rect = container.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;

      fireworksCanvas.width = rect.width * scale;
      fireworksCanvas.height = rect.height * scale;

      ctx.setTransform(scale, 0, 0, scale, 0, 0);
    }

    function createFirework() {
      const width = fireworksCanvas.clientWidth;
      const height = fireworksCanvas.clientHeight;

      const x = Math.random() * width;
      const y = 60 + Math.random() * height * 0.45;

      const colors = [
        "#0066ff",
        "#00b050",
        "#fff200",
        "#ff3b1f",
        "#7a0000",
        "#ffffff"
      ];

      const color = colors[Math.floor(Math.random() * colors.length)];

      const particleCount = fireworksLevel === 2 ? 90 : 40;
      const speedBase = fireworksLevel === 2 ? 3 : 2;

      for (let i = 0; i < particleCount; i++) {
        const angle = Math.PI * 2 * (i / particleCount);
        const speed = speedBase + Math.random() * 4;

        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          alpha: 1,
          size: fireworksLevel === 2
            ? 1.8 + Math.random() * 3
            : 1.3 + Math.random() * 2,
          color
        });
      }
    }

    function updateFireworks() {
      const width = fireworksCanvas.clientWidth;
      const height = fireworksCanvas.clientHeight;

      ctx.clearRect(0, 0, width, height);
      ctx.globalCompositeOperation = "lighter";

      const fireworkChance = fireworksLevel === 2 ? 0.11 : 0.045;

      if (fireworksRunning && Math.random() < fireworkChance) {
        createFirework();
      }

      particles = particles.filter(particle => {
        particle.x += particle.vx;
        particle.y += particle.vy;
        particle.vy += 0.04;
        particle.alpha -= 0.015;

        if (particle.alpha <= 0) {
          return false;
        }

        ctx.globalAlpha = particle.alpha;
        ctx.fillStyle = particle.color;

        ctx.beginPath();
        ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
        ctx.fill();

        return true;
      });

      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = "source-over";

      if (fireworksRunning || particles.length > 0) {
        fireworksAnimationId = requestAnimationFrame(updateFireworks);
      } else {
        fireworksAnimationId = null;
        ctx.clearRect(0, 0, width, height);
      }
    }

    function startFireworks(level) {
      resizeFireworksCanvas();

      fireworksLevel = level;
      fireworksRunning = true;

      if (fireworksTimer) {
        clearTimeout(fireworksTimer);
      }

      const duration = level === 2 ? 4500 : 2500;

      fireworksTimer = setTimeout(() => {
        fireworksRunning = false;
      }, duration);

      if (!fireworksAnimationId) {
        updateFireworks();
      }
    }

    function stopFireworks() {
      fireworksRunning = false;
      fireworksLevel = 0;
      particles = [];

      if (fireworksTimer) {
        clearTimeout(fireworksTimer);
        fireworksTimer = null;
      }

      if (fireworksAnimationId) {
        cancelAnimationFrame(fireworksAnimationId);
        fireworksAnimationId = null;
      }

      ctx.clearRect(
        0,
        0,
        fireworksCanvas.clientWidth,
        fireworksCanvas.clientHeight
      );
    }

    function fillPyramid() {
      let total = 0;

      inputs.forEach(input => {
        let value = Number(input.value) || 0;

        value = Math.max(0, Math.min(value, MAX_ITEM_SCORE));

        input.value = value;
        total += value;
      });

      const ratio = total / MAX_TOTAL;
      const fillHeight = PYRAMID_HEIGHT * ratio;

      totalValue.textContent = total;

      animateWater(fillHeight);

      if (total >= 75) {
        startFireworks(2);
      } else if (total >= 50) {
        startFireworks(1);
      } else {
        stopFireworks();
      }
    }

    window.addEventListener("resize", resizeFireworksCanvas);
    resizeFireworksCanvas();

    confirmButton.addEventListener("click", fillPyramid);
  </script>
</body>
</html>
